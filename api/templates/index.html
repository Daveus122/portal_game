<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamVault — Portal de Videojuegos</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #050810;
            --card: #0d1526;
            --border: #1a2540;
            --accent: #00f0ff;
            --accent2: #ff2d6b;
            --text: #e2e8f0;
            --muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 240, 255, .03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, .03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            background: rgba(5, 8, 16, .95);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0, 240, 255, .5);
            letter-spacing: 2px;
        }

        .logo span {
            color: var(--accent2);
        }

        .header-right {
            font-size: .75rem;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .filters-wrap {
            background: rgba(13, 21, 38, .8);
            border-bottom: 1px solid var(--border);
            padding: 1.2rem 2rem;
            position: sticky;
            top: 61px;
            z-index: 90;
            backdrop-filter: blur(10px);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: .8rem;
            max-width: 1300px;
            margin: 0 auto;
            align-items: flex-end;
        }

        .fg {
            display: flex;
            flex-direction: column;
            gap: .3rem;
            flex: 1;
            min-width: 130px;
        }

        .fg label {
            font-size: .65rem;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }

        input,
        select {
            background: #080f1e;
            border: 1px solid var(--border);
            color: var(--text);
            padding: .5rem .8rem;
            border-radius: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-size: .9rem;
            width: 100%;
            outline: none;
            transition: border-color .2s;
        }

        input:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0, 240, 255, .1);
        }

        .btn-row {
            display: flex;
            gap: .5rem;
        }

        .btn {
            padding: .52rem 1.2rem;
            border: none;
            border-radius: 6px;
            font-family: 'Orbitron', monospace;
            font-size: .65rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all .2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: #050810;
        }

        .btn-primary:hover {
            background: #00d4e0;
            box-shadow: 0 0 15px rgba(0, 240, 255, .4);
        }

        .btn-clear {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .btn-clear:hover {
            border-color: var(--accent2);
            color: var(--accent2);
        }

        .content {
            max-width: 1300px;
            margin: 0 auto;
            padding: 1.5rem 2rem 3rem;
            position: relative;
            z-index: 1;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .info-count {
            font-size: .8rem;
            color: var(--muted);
        }

        .info-count strong {
            color: var(--accent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color .2s, transform .2s, box-shadow .2s;
            animation: fadeIn .3s ease both;
        }

        .card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 240, 255, .1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
            background: #080f1e;
        }

        .card-body {
            padding: .85rem 1rem;
        }

        .card-title {
            font-family: 'Orbitron', monospace;
            font-size: .78rem;
            font-weight: 700;
            margin-bottom: .35rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-desc {
            font-size: .78rem;
            color: var(--muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: .6rem;
            line-height: 1.45;
        }

        .pills {
            display: flex;
            flex-wrap: wrap;
            gap: .3rem;
            margin-bottom: .55rem;
        }

        .pill {
            padding: .15rem .5rem;
            border-radius: 99px;
            font-size: .62rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .pill-genre {
            background: rgba(124, 58, 237, .2);
            border: 1px solid rgba(124, 58, 237, .4);
            color: #c4b5fd;
        }

        .pill-plat {
            background: rgba(0, 240, 255, .1);
            border: 1px solid rgba(0, 240, 255, .3);
            color: var(--accent);
        }

        .pill-price {
            background: rgba(255, 45, 107, .1);
            border: 1px solid rgba(255, 45, 107, .3);
            color: var(--accent2);
        }

        .pill-free {
            background: rgba(34, 197, 94, .1);
            border: 1px solid rgba(34, 197, 94, .3);
            color: #86efac;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: .25rem;
        }

        .tag {
            padding: .1rem .4rem;
            background: rgba(255, 255, 255, .04);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 4px;
            font-size: .6rem;
            color: var(--muted);
        }

        .loader {
            text-align: center;
            padding: 5rem 2rem;
            grid-column: 1/-1;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            margin: 0 auto 1rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .loader-text {
            font-family: 'Orbitron', monospace;
            color: var(--accent);
            font-size: .8rem;
            letter-spacing: 3px;
        }

        .empty {
            grid-column: 1/-1;
            text-align: center;
            padding: 4rem;
            color: var(--muted);
            font-size: 1rem;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: .4rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .btn-page {
            padding: .4rem .9rem;
            border-radius: 6px;
            font-family: 'Orbitron', monospace;
            font-size: .6rem;
            cursor: pointer;
            background: #080f1e;
            border: 1px solid var(--border);
            color: var(--text);
            transition: all .2s;
        }

        .btn-page:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-page.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(0, 240, 255, .08);
        }

        .btn-page:disabled {
            opacity: .3;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">STEAM<span>VAULT</span></div>
        <div class="header-right">Portal de Videojuegos</div>
    </header>

    <div class="filters-wrap">
        <div class="filters">
            <div class="fg" style="flex:2;min-width:180px">
                <label>Nombre</label>
                <input id="fTitle" type="text" placeholder="Buscar juego…">
            </div>
            <div class="fg">
                <label>Plataforma</label>
                <select id="fPlatform">
                    <option value="">Todas</option>
                </select>
            </div>
            <div class="fg">
                <label>Género</label>
                <select id="fGenre">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="fg">
                <label>Etiqueta</label>
                <input id="fTag" type="text" placeholder="Ej: action, rpg…">
            </div>
            <div class="fg" style="flex:0;min-width:auto">
                <label>&nbsp;</label>
                <div class="btn-row">
                    <button class="btn btn-primary" onclick="doSearch(0)">BUSCAR</button>
                    <button class="btn btn-clear" onclick="clearFilters()">✕</button>
                </div>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="info-bar">
            <div class="info-count" id="infoCount"></div>
        </div>
        <div class="grid" id="grid"></div>
        <div class="pagination" id="pagination"></div>
    </div>

    <script>
        // ← CAMBIADO PARA LOCAL (antes era '')
        const API = 'http://localhost:5000';
        const LIMIT = 20;
        let currentOffset = 0;

        async function loadMeta() {
            try {
                const [pRes, gRes] = await Promise.all([
                    fetch(`${API}/api/platforms`),
                    fetch(`${API}/api/genres`)
                ]);
                const platforms = await pRes.json();
                const genres = await gRes.json();
                const ps = document.getElementById('fPlatform');
                platforms.forEach(p => { if (p) ps.add(new Option(p, p)); });
                const gs = document.getElementById('fGenre');
                genres.forEach(g => { if (g) gs.add(new Option(g, g)); });
            } catch (e) {
                console.warn('No se pudieron cargar filtros:', e);
            }
        }

        async function doSearch(offset = 0) {
            currentOffset = offset;

            const title = document.getElementById('fTitle').value.trim();
            const platform = document.getElementById('fPlatform').value;
            const genre = document.getElementById('fGenre').value;
            const tag = document.getElementById('fTag').value.trim();

            const params = new URLSearchParams({
                limit: LIMIT,
                offset
            });

            if (title) params.set('title', title);
            if (platform) params.set('platform', platform);
            if (genre) params.set('genre', genre);
            if (tag) params.set('tag', tag);

            document.getElementById('grid').innerHTML =
                '<div class="loader"><div class="spinner"></div><div class="loader-text">CARGANDO…</div></div>';

            try {
                const res = await fetch(`${API}/api/games?${params}`);
                const data = await res.json();

                renderGames(data.results, data.total, offset);
                renderPagination(data.total, offset);

            } catch (e) {
                console.error(e);

                document.getElementById('grid').innerHTML =
                    '<div class="empty">⚠️ Error conectando API</div>';
            }
        }
        function renderGames(games, total, offset) {
            const count = document.getElementById('infoCount');
            if (total === 0) {
                count.innerHTML = '';
                document.getElementById('grid').innerHTML =
                    '<div class="empty">🎮 No se encontraron juegos.</div>';
                return;
            }
            const from = offset + 1;
            const to = Math.min(offset + LIMIT, total);
            count.innerHTML = `Mostrando <strong>${from}–${to}</strong> de <strong>${total}</strong> juegos`;

            document.getElementById('grid').innerHTML = games.map((g, i) => {
                const isFree = !g.price || g.price === 'Free' || g.price === '0';
                const priceHTML = isFree
                    ? `<span class="pill pill-free">GRATIS</span>`
                    : `<span class="pill pill-price">${g.price}</span>`;
                const genre = g.genre ? g.genre.split(',')[0].trim() : '';
                const platform = g.platform ? g.platform.split(',')[0].trim() : '';
                const tags = (g.tags || []).slice(0, 4);
                return `
        <div class="card" style="animation-delay:${i * 0.03}s"
             onclick="window.open('${g.game_url}', '_blank')">
          <img src="${g.thumbnail || ''}" alt="${g.title}"
               loading="lazy" onerror="this.style.display='none'">
          <div class="card-body">
            <div class="card-title" title="${g.title}">${g.title}</div>
            <div class="card-desc">${g.short_description || ''}</div>
            <div class="pills">
              ${genre ? `<span class="pill pill-genre">${genre}</span>` : ''}
              ${platform ? `<span class="pill pill-plat">${platform}</span>` : ''}
              ${priceHTML}
            </div>
            <div class="tags">
              ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
          </div>
        </div>`;
            }).join('');
        }

        function renderPagination(total, offset) {
            const pages = Math.ceil(total / LIMIT);
            const curPage = Math.floor(offset / LIMIT) + 1;
            const pg = document.getElementById('pagination');
            if (pages <= 1) { pg.innerHTML = ''; return; }
            const start = Math.max(1, curPage - 2);
            const end = Math.min(pages, curPage + 2);
            let html = `<button class="btn-page" ${curPage === 1 ? 'disabled' : ''} onclick="doSearch(${(curPage - 2) * LIMIT})">◀</button>`;
            for (let p = start; p <= end; p++) {
                html += `<button class="btn-page ${p === curPage ? 'active' : ''}" onclick="doSearch(${(p - 1) * LIMIT})">${p}</button>`;
            }
            html += `<button class="btn-page" ${curPage === pages ? 'disabled' : ''} onclick="doSearch(${curPage * LIMIT})">▶</button>`;
            pg.innerHTML = html;
        }

        function clearFilters() {
            document.getElementById('fTitle').value = '';
            document.getElementById('fPlatform').value = '';
            document.getElementById('fGenre').value = '';
            document.getElementById('fTag').value = '';
            doSearch(0);
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(0); });
        loadMeta();
        doSearch(0);
    </script>
</body>

</html>
