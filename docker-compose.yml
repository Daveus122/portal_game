version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: steam_db
    restart: always
    environment:
      POSTGRES_DB: steamgames
      POSTGRES_USER: steamuser
      POSTGRES_PASSWORD: steampass123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steamuser -d steamgames"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: steam_api
    restart: always
    environment:
      DATABASE_URL: postgresql://steamuser:steampass123@db:5432/steamgames
      STEAM_KEY: ${STEAM_KEY}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    container_name: steam_web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata: